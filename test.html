
<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Red-Drive Theorie-examen</title>

  <link rel="stylesheet" href="test-c.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand__title">Red-Drive Theorie-examen</div>
        <div class="brand__sub">21 vragen • maximaal 3 fouten</div>
      </div>

      <div class="topbar__right">
        <div class="timer" aria-live="polite" title="Tijd">
          <span class="timer__label">Tijd</span>
          <span id="timerValue" class="timer__value">30:00</span>
        </div>

        <button id="overviewBtn" class="btn btn--ghost" type="button">
          Overzicht
        </button>

        <button id="submitBtn" class="btn btn--danger" type="button">
          Sla test in
        </button>
      </div>
    </header>

    <main class="card">
      <div class="progress">
        <div class="progress__left">
          <span id="progressText">Vraag 1 van 21</span>
        </div>
        <div class="progress__bar" aria-hidden="true">
          <div id="progressFill" class="progress__fill"></div>
        </div>
      </div>

      <section id="questionArea" class="questionArea" aria-live="polite">

      </section>

      <footer class="nav">
        <button id="prevBtn" class="btn btn--ghost" type="button">← Vorige</button>

        <div class="nav__hint">
        </div>

        <button id="nextBtn" class="btn btn--primary" type="button">Volgende →</button>
      </footer>

      <div id="resultArea" class="resultArea" hidden>

      </div>
    </main>
  </div>

  <div id="overviewModal" class="modal" hidden aria-hidden="true">
    <div class="modal__backdrop" data-close="1"></div>
    <div class="modal__panel" role="dialog" aria-modal="true" aria-labelledby="overviewTitle">
      <div class="modal__header">
        <div>
          <div id="overviewTitle" class="modal__title">Overzicht</div>
          <div class="modal__subtitle">Klik op een vraag om te openen</div>
        </div>
        <button class="btn btn--ghost" type="button" data-close="1">✕</button>
      </div>

      <div id="overviewGrid" class="overviewGrid">
      </div>

      <div class="modal__footer">
        <div class="legend">
          <span class="dot dot--answered"></span> beantwoord
          <span class="dot dot--unanswered"></span> onbeantwoord
          <span class="dot dot--wrong" id="legendWrong" hidden></span><span id="legendWrongText" hidden> fout</span>
          <span class="dot dot--correct" id="legendCorrect" hidden></span><span id="legendCorrectText" hidden> goed</span>
        </div>
        <button class="btn btn--primary" type="button" data-close="1">Terug</button>
      </div>
    </div>
  </div>

  <script src="./upload.js"></script>
  <script src="./test-j.js"></script>
</body>
</html>
