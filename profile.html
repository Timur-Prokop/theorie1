<body>

  <div id="site-header"></div>

      <div class="box">
    <h1>Profile</h1>
    
    <div id="content">Loading...
    </div>

    <div id="status"></div>

    <button class="logoutbtn" onclick="logout()">Logout</button>
  </div>

<script>
  async function loadProfile() {
    const response = await fetch("/api/me", {
      method: "GET",
      credentials: "include"
    });

    const data = await response.json();

    if (!data.user) {
      window.location.href = "/log-in.html";
      return;
    }

    document.getElementById("content").innerHTML = `
      <p><strong>Name:</strong> ${data.user.name}</p>
      <p><strong>Email:</strong> ${data.user.email}</p>
      <p><strong>Created at:</strong> ${new Date(data.user.createdAt).toLocaleDateString("nl-NL")}</p>
      
      <p><strong>Plan:</strong> ${data.user.subscription?.plan || "No premium"}</p>
      <p><strong>Premium geldt tot: </strong> ${new Date(data.user.expireDate).toLocaleDateString("nl-NL") || ""}</p>
    `;
  }

  async function logout() {
    await fetch("/api/logout", {
      method: "POST",
      credentials: "include"
    });
    window.location.href = "/log-in.html";
  }

  loadProfile();
</script>

  <script src="jsjson/include.js"></script>
</body>
</html>
